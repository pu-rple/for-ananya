<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 For Ananya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }
    .hearts-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .heart-float {
      position: absolute; font-size: 20px;
      animation: floatUp linear infinite; opacity: 0.3;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
    .container {
      position: relative; z-index: 1;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 2rem;
    }
    .big-heart {
      font-size: 4rem; margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 3.5rem;
      background: linear-gradient(135deg, #ff6b9d, #ff4757);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.2rem; margin: 0.5rem 0 2rem; color: #ffb8c6;
      max-width: 500px; line-height: 1.7;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem; max-width: 450px; width: 100%;
    }
    .link-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,107,157,0.3);
      border-radius: 16px; padding: 1.5rem 1rem;
      text-decoration: none; color: #fff;
      transition: all 0.3s ease;
    }
    .link-card:hover {
      background: rgba(255,107,157,0.2);
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(255,107,157,0.2);
    }
    .link-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .link-card .label { font-size: 1.1rem; font-weight: 600; }
    .link-card .desc { font-size: 0.8rem; color: #aaa; margin-top: 0.3rem; }
    footer {
      position: fixed; bottom: 1.5rem; z-index: 1;
      color: #555; font-size: 0.85rem; text-align: center; width: 100%;
    }
    @media (max-width: 500px) {
      h1 { font-size: 2.5rem; }
      .links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="container">
    <div class="big-heart">💖</div>
    <h1>Yay! 💕</h1>
    <p class="subtitle">
      You said yes! Now explore every corner —<br>
      each one has a piece of my heart for you 💫
    </p>
    <div class="links">
      <a class="link-card" href="letter.html">
        <div class="icon">💌</div>
        <div class="label">A Letter</div>
        <div class="desc">Something from the heart</div>
      </a>
      <a class="link-card" href="surprise.html">
        <div class="icon">🎁</div>
        <div class="label">A Surprise</div>
        <div class="desc">Click and see!</div>
      </a>
      <a class="link-card" href="thought.html">
        <div class="icon">✨</div>
        <div class="label">A Thought</div>
        <div class="desc">Just for today</div>
      </a>
      <a class="link-card" href="games.html">
        <div class="icon">🎮</div>
        <div class="label">Mini Games</div>
        <div class="desc">Have some fun!</div>
      </a>
    </div>
  </div>

  <footer>Made with 💖 for Ananya</footer>

  <script>
    function createHearts() {
      const container = document.getElementById('heartsBg');
      const emojis = ['💖', '💗', '💕', '❤️', '🌸', '✨'];
      for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (14 + Math.random() * 24) + 'px';
        el.style.animationDuration = (8 + Math.random() * 12) + 's';
        el.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(el);
      }
    }
    createHearts();
  </script>
</body>
</html>
